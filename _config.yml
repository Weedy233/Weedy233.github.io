# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: "Weedy's Blog"
subtitle: ''
description: '这是我的个人技术博客，主要分享计算机科学、编程实践、技术学习过程以及相关经验，包括 C/C++、前端技术、Git 使用、服务器配置等内容。记录我的学习历程，分享实用技巧，帮助更多开发者成长。This is my personal tech blog, where I share my journey of learning computer science, programming practices, and technical experiences. Topics include C/C++, front-end technologies, Git usage, server configuration, and more. Documenting my learning process and sharing practical tips to help fellow developers grow.'
keywords: 计算机科学、编程实践、技术博客、C语言、C++、嵌入式开发、前端技术、Git教程、服务器配置、Hexo博客、网站部署、Linux运维、Nginx、Cloudflare、开发者学习、开源项目、个人博客、技术分享、代码优化 Computer Science, Programming, Tech Blog, C Programming, C++, Embedded Development, Frontend Technologies, Git Tutorial, Server Configuration, Hexo Blog, Website Deployment, Linux Administration, Nginx, Cloudflare, Developer Learning, Open Source, Personal Blog, Tech Sharing, Code Optimization
author: Weedy
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://blog.rikka.top
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: false # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: landscape

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''
